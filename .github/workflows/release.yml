name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the changeset-release/main branch is pushed by a user identity.
          # The org disables "Actions can create PRs", so the default GITHUB_TOKEN
          # cannot open the Version Packages PR (HTTP 409). A PAT bypasses that.
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@eq-solutions'

      - run: npm ci

      - uses: changesets/action@v1
        with:
          publish: npm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # PR creation + git operations run as the PAT user (bypasses org PR block).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          # npm publish to GitHub Packages keeps the ephemeral, repo-scoped token.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
